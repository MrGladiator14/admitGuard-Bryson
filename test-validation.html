<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Validation Test</title>
<style>
body { font-family: Arial, sans-serif; padding: 20px; }
.test-result { margin: 10px 0; padding: 10px; border-radius: 4px; }
.pass { background: #d4edda; color: #155724; }
.fail { background: #f8d7da; color: #721c24; }
</style>
</head>
<body>
<h1>Configuration-Driven Validation Test</h1>
<div id="testResults"></div>

<script>
// Test the configuration loading and validation logic
async function testValidation() {
  const results = document.getElementById('testResults');
  
  try {
    // Load configuration
    const response = await fetch('./config/schema.json');
    const config = await response.json();
    
    // Test 1: Configuration loading
    let test1 = document.createElement('div');
    test1.className = config && config.rules ? 'test-result pass' : 'test-result fail';
    test1.textContent = `âś“ Configuration loaded: ${config.rules.length} rules found`;
    results.appendChild(test1);
    
    // Test 2: Field mapping
    let test2 = document.createElement('div');
    const expectedFields = ['fullName', 'email', 'phone', 'dateOfBirth', 'highestQualification', 'graduationYear', 'percentageCgpa', 'screeningScore', 'interviewStatus', 'aadhaarNumber', 'offerLetterSent'];
    const actualFields = config.rules.map(rule => rule.field);
    const fieldsMatch = expectedFields.every(field => actualFields.includes(field));
    test2.className = fieldsMatch ? 'test-result pass' : 'test-result fail';
    test2.textContent = `âś“ Field mapping: ${fieldsMatch ? 'All expected fields found' : 'Missing fields detected'}`;
    results.appendChild(test2);
    
    // Test 3: Exception configuration
    let test3 = document.createElement('div');
    const exceptionFields = config.rules.filter(rule => rule.exceptionAllowed).map(rule => rule.field);
    const expectedExceptions = ['dateOfBirth', 'graduationYear', 'percentageCgpa', 'screeningScore'];
    const exceptionsMatch = expectedExceptions.every(field => exceptionFields.includes(field));
    test3.className = exceptionsMatch ? 'test-result pass' : 'test-result fail';
    test3.textContent = `âś“ Exception configuration: ${exceptionsMatch ? 'Correctly configured' : 'Exception config mismatch'}`;
    results.appendChild(test3);
    
    // Test 4: Validation rules
    let test4 = document.createElement('div');
    const validationRules = {
      'fullName': /^[a-zA-Z\s]{2,}$/,
      'email': /^[^\s@]+@[^\s@]+\.[^\s@]+$/,
      'phone': /^[6-9]\d{9}$/,
      'aadhaarNumber': /^\d{12}$/
    };
    
    let rulesValid = true;
    Object.entries(validationRules).forEach(([field, expectedRegex]) => {
      const rule = config.rules.find(r => r.field === field);
      if (!rule || rule.validation !== expectedRegex.source) {
        rulesValid = false;
      }
    });
    
    test4.className = rulesValid ? 'test-result pass' : 'test-result fail';
    test4.textContent = `âś“ Validation rules: ${rulesValid ? 'All regex patterns correct' : 'Invalid patterns detected'}`;
    results.appendChild(test4);
    
    // Test 5: Custom validation rules
    let test5 = document.createElement('div');
    const customRules = config.rules.filter(rule => 
      rule.validation.startsWith('ageRange') || 
      rule.validation.startsWith('minPercentage') || 
      rule.validation === 'screeningScore'
    );
    
    const expectedCustomRules = ['dateOfBirth', 'percentageCgpa', 'screeningScore'];
    const customRulesMatch = expectedCustomRules.every(field => 
      customRules.some(rule => rule.field === field)
    );
    
    test5.className = customRulesMatch ? 'test-result pass' : 'test-result fail';
    test5.textContent = `âś“ Custom validation rules: ${customRulesMatch ? 'Correctly configured' : 'Missing custom rules'}`;
    results.appendChild(test5);
    
  } catch (error) {
    let errorDiv = document.createElement('div');
    errorDiv.className = 'test-result fail';
    errorDiv.textContent = `âś— Test failed: ${error.message}`;
    results.appendChild(errorDiv);
  }
}

// Run tests when page loads
document.addEventListener('DOMContentLoaded', testValidation);
</script>
</body>
</html>
