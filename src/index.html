<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Candidate Admission Form</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="wrap">
  <header>
    <h1>Admission Form</h1>
    <p>Complete your application for enrollment consideration</p>
    <div class="progress-bar"><div class="progress-fill" id="pfill"></div></div>
  </header>
  <div class="progress-label">
    <span id="ppct">0% complete</span>
    <span id="pcnt">0 / 11 fields</span>
  </div>

  <div class="error-banner" id="errBanner">
    <h4>Please fix the following:</h4>
    <ul class="error-list" id="errList"></ul>
  </div>

  <div class="warning-banner" id="warningBanner">
    <span class="warning-icon">⚠️</span>
    <span class="warning-text">This candidate has more than 2 exceptions. Entry will be flagged for manager review.</span>
  </div>

  <form id="theForm" class="form-body" novalidate>
    <!-- Form fields will be dynamically generated from configuration -->
  </form>

  <footer>
    <div class="exception-counter" id="exceptionCounter">Active Exceptions: 0/4</div>
    <button class="submit-btn" id="submitBtn" disabled>Submit Application</button>
  </footer>
</div>

<script src="script.js"></script>
</body>
</html>
